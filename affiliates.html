<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expertly · Affiliation interne</title>
    <link rel="stylesheet" href="./affiliate-admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header>
        <div>
          <p>Affiliation interne</p>
          <h1>Influenceurs Expertly</h1>
        </div>
        <button id="refreshButton" type="button">Actualiser</button>
      </header>

      <section class="metric-grid" id="affiliateMetrics"></section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Partenaires</h2>
          <span>Liens referral et commissions</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Influenceur</th>
                <th>Lien</th>
                <th>Clics</th>
                <th>Clients</th>
                <th>Revenu</th>
                <th>À payer</th>
                <th>Payé</th>
              </tr>
            </thead>
            <tbody id="affiliateRows"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Commissions</h2>
          <span>Paiements Stripe confirmés</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Affilié</th>
                <th>Plan</th>
                <th>Client</th>
                <th>Montant</th>
                <th>Commission</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="commissionRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./affiliate-admin.js"></script>
  </body>
</html>
