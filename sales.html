<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Offre · Expertly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/store.css" />
  </head>
  <body data-surface="sales_page">
    <main class="store-shell">
      <header class="creator-header">
        <div class="creator-avatar is-empty" id="creatorAvatar"></div>
        <div class="creator-copy">
          <h1 id="creatorName">Boutique</h1>
          <p class="creator-role" id="creatorRole"></p>
          <p class="creator-bio" id="creatorBio"></p>
          <div class="social-links" id="creatorSocials" hidden></div>
        </div>
      </header>

      <section class="link-list" id="publicOffers"></section>
    </main>

    <footer><span class="mini-mark">E</span> Propulsé par <strong>Expertly</strong></footer>

    <div class="modal" id="checkoutModal" aria-hidden="true">
      <div class="modal-card">
        <button class="close-button" data-close-checkout>×</button>
        <div id="checkoutContent"></div>
      </div>
    </div>

    <div class="store-toast" id="storeToast"></div>
    <script src="https://unpkg.com/@jhrunning/inappbrowserescaper@1.0.1/dist/browser/inappbrowserescaper.js"></script>
    <script src="/assets/js/inapp-escape.js"></script>
    <script src="/assets/js/analytics.js"></script>
    <script src="/assets/js/sales.js"></script>
  </body>
</html>
